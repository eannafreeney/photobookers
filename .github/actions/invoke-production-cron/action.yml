name: Invoke production cron endpoint
description: POST to a /jobs/cron/* route with CRON_SECRET auth

inputs:
  endpoint:
    description: Path segment after /jobs/cron/ (e.g. weekly-botd-newsletter)
    required: true
  cron_secret:
    description: Production CRON_SECRET (pass secrets.CRON_SECRET from the workflow)
    required: true

runs:
  using: composite
  steps:
    - name: POST /jobs/cron/${{ inputs.endpoint }}
      shell: bash
      env:
        CRON_SECRET: ${{ inputs.cron_secret }}
      run: |
        set -euo pipefail
        if [[ -z "${CRON_SECRET:-}" ]]; then
          echo "CRON_SECRET is not set in repository secrets" >&2
          exit 1
        fi
        curl -fsS -X POST \
          -H "Authorization: Bearer ${CRON_SECRET}" \
          "https://www.photobookers.com/jobs/cron/${{ inputs.endpoint }}"
