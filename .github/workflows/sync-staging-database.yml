# .github/workflows/sync-staging-database.yml
name: Sync staging database

on:
  schedule:
    - cron: "0 4 * * 0" # Sunday 04:00 UTC
  workflow_dispatch: # manual "Run workflow" button

env:
  PG_DUMP_PATH: /usr/lib/postgresql/17/bin/pg_dump
  PSQL_PATH: /usr/lib/postgresql/17/bin/psql

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: Verify pg_dump version
        run: |
          "$PG_DUMP_PATH" --version
          "$PSQL_PATH" --version
      - run: npm ci
      - name: Validate config (dry run)
        run: npx tsx scripts/sync-staging-database.ts --dry-run
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      - name: Sync staging database
        run: npx tsx scripts/sync-staging-database.ts
        env:
          ALLOW_STAGING_DB_SYNC: "true"
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
