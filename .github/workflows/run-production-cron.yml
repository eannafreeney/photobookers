# Reusable workflow: run scripts/cron/run.ts with production env (no HTTP hit to web service).
# Call with secrets: inherit from production-cron.yml.
name: Run production cron script

on:
  workflow_call:
    inputs:
      job:
        description: Cron job name (e.g. weekly-botd-newsletter)
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scripts/cron/run.ts ${{ inputs.job }}
        env:
          ENV: production
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          FUNCTION_SECRET: ${{ secrets.PRODUCTION_FUNCTION_SECRET }}
          SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
          PUBLIC_APP_URL: ${{ secrets.PRODUCTION_PUBLIC_APP_URL }}
          ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          BREVO_TEST_EMAIL: ${{ secrets.PRODUCTION_BREVO_TEST_EMAIL }}
          ADMIN_USER_ID: ${{ secrets.PRODUCTION_ADMIN_USER_ID }}
          BREVO_API_KEY: ${{ secrets.PRODUCTION_BREVO_API_KEY }}
          BREVO_NEWSLETTER_LIST_ID: ${{ secrets.PRODUCTION_BREVO_NEWSLETTER_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ secrets.PRODUCTION_BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.PRODUCTION_BREVO_SENDER_NAME }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.PRODUCTION_BUFFER_ACCESS_TOKEN }}
          BUFFER_INSTAGRAM_CHANNEL_ID: ${{ secrets.PRODUCTION_BUFFER_INSTAGRAM_CHANNEL_ID }}
          BUFFER_INSTAGRAM_FIRST_COMMENT: ${{ secrets.PRODUCTION_BUFFER_INSTAGRAM_FIRST_COMMENT }}
          BOTD_INSTAGRAM_POST_TIME: ${{ secrets.PRODUCTION_BOTD_INSTAGRAM_POST_TIME }}
          OPENAI_API_KEY: ${{ secrets.PRODUCTION_OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.PRODUCTION_OPENAI_MODEL }}
          STUB_OUTREACH_DAILY_WELCOME_LIMIT: ${{ secrets.STUB_OUTREACH_DAILY_WELCOME_LIMIT }}
        run: npx tsx scripts/cron/run.ts "${{ inputs.job }}"
