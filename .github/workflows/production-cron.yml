# Runs production cron scripts via GitHub Actions (no HTTP hit to Render web service).
# Production secrets are wired in .github/workflows/run-production-cron.yml
name: Production cron jobs

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC — queue Instagram before 10:00 post time
    - cron: "0 8 * * 1" # Monday 08:00 UTC — CEO weekly metrics email
    - cron: "0 9 * * *" # daily 09:00 UTC — BOTD / spotlight / follower emails
    - cron: "0 9 * * 3" # Wednesday 09:00 UTC — weekly newsletter
    - cron: "0 9 * * 6" # Saturday 09:00 UTC — Instagram prep reminder
    - cron: "0 9 3 * *" # 3rd of month 09:00 UTC — creator analytics digest
    - cron: "0 10 * * *" # daily 10:00 UTC — creator milestone + stub outreach
    - cron: "0 10 * * 4" # Thursday 10:00 UTC — open interview reminders (14-day cadence in app)
    - cron: "0 11 * * *" # daily 11:00 UTC — verified creator Instagram
  workflow_dispatch:
    inputs:
      job:
        description: Cron job to run manually
        required: true
        type: choice
        options:
          - daily-botd-instagram
          - botd-advance-notification-emails
          - botd-feature-day-emails
          - ceo-metrics-email
          - spotlight-creator-emails
          - notify-followers-new-books
          - notify-followers-new-posts
          - weekly-botd-newsletter
          - instagram-prep-reminder-email
          - planner-content-preview-email
          - creator-analytics-digest
          - creator-milestone-emails
          - stub-outreach-emails
          - interview-reminder-emails
          - verified-creator-instagram

jobs:
  daily-botd-instagram:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-botd-instagram')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: daily-botd-instagram
    secrets: inherit

  botd-advance-notification-emails:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'botd-advance-notification-emails')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: botd-advance-notification-emails
    secrets: inherit

  ceo-metrics-email:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'ceo-metrics-email')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: ceo-metrics-email
