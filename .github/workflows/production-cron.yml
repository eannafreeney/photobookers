# Runs production cron scripts via GitHub Actions (no HTTP hit to Render web service).
# Production secrets are wired in .github/workflows/run-production-cron.yml
name: Production cron jobs

on:
  schedule:
    - cron: "17 8 * * *" # daily 08:17 UTC — Instagram queue + CEO metrics + product digest
    - cron: "17 9 * * *" # daily 09:17 UTC — BOTD / spotlight / follower emails
    - cron: "17 8 * * 2" # Tuesday 08:17 UTC — pre-create next week's newsletter draft
    - cron: "17 9 * * 2" # Tuesday 09:17 UTC — weekly newsletter test send
    - cron: "17 9 * * 3" # Wednesday 09:17 UTC — weekly newsletter
    - cron: "17 9 * * 6" # Saturday 09:17 UTC — Instagram prep reminder
    - cron: "17 9 3 * *" # 3rd of month 09:17 UTC — creator analytics digest
    - cron: "17 10 * * *" # daily 10:17 UTC — creator milestone + stub outreach + verification feedback
    - cron: "17 10 * * 3" # Wednesday 10:17 UTC — trending Instagram (prepare + queue + preview email)
    - cron: "17 10 * * 4" # Thursday 10:17 UTC — interview reminders
    - cron: "17 11 * * 1" # Monday 11:17 UTC — verified creator Instagram (posts Tuesday)
    - cron: "17 11 * * 3" # Wednesday 11:17 UTC — verified creator Instagram (posts Thursday)
  workflow_dispatch:
    inputs:
      job:
        description: Cron job to run manually
        required: true
        type: choice
        options:
          - daily-botd-instagram
          - botd-advance-notification-emails
          - botd-feature-day-emails
          - ceo-metrics-email
          - daily-product-digest
          - spotlight-creator-emails
          - notify-followers-new-books
          - notify-followers-new-posts
          - weekly-botd-newsletter
          - weekly-botd-newsletter-test
          - weekly-botd-newsletter-prepare
          - weekly-trending-instagram
          - instagram-prep-reminder-email
          - planner-content-preview-email
          - creator-analytics-digest
          - creator-milestone-emails
          - stub-outreach-emails
          - interview-reminder-emails
          - verified-creator-instagram
          - verification-feedback-emails
          - creator-profile-share-emails

jobs:
  daily-botd-instagram:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '17 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-botd-instagram')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: daily-botd-instagram
    secrets: inherit

  botd-advance-notification-emails:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '17 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'botd-advance-notification-emails')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: botd-advance-notification-emails
    secrets: inherit

  ceo-metrics-email:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '17 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'ceo-metrics-email')
    uses: ./.github/workflows/run-production-cron.yml
    with:
      job: ceo-metrics-email
    secrets: inherit

  daily-product-digest:
