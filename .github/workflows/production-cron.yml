      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'botd-feature-day-emails')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-production-cron
        with:
          job: botd-feature-day-emails

  spotlight-creator-emails:
