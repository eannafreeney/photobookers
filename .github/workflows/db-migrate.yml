# Run Drizzle migrations manually (e.g. re-run without a deploy).
# On push to main/staging, CI runs migrations automatically before Render deploys.
name: Database migrate

on:
  workflow_dispatch:
    inputs:
      target:
        description: Database to migrate
        required: true
        type: choice
        options:
          - production
          - staging

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Align Drizzle migration history (staging)
        if: inputs.target == 'staging'
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx tsx scripts/sync-drizzle-migrations-to-staging.ts

      - name: Run migrations (production)
        if: inputs.target == 'production'
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npm run db:migrate

      - name: Run migrations (staging)
        if: inputs.target == 'staging'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npm run db:migrate
